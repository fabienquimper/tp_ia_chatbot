name: CI — Tests & Qualité

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: chatbot-api
  PYTHON_VERSION: "3.11"

jobs:
  # ── 1. Lint & Format ───────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/ --output-format=github

  # ── 2. Tests unitaires & intégration ──────────────────────────────────────
  tests:
    name: Tests (unit + integration + security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etape_13_deployable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: etape_13_deployable/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DB_PATH: /tmp/test_chat.db
          SECRET_KEY: test-secret-key-for-ci-only
          OPENAI_API_KEY: sk-test-fake-key-ci
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junit-xml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: etape_13_deployable/coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: etape_13_deployable/test-results.xml

  # ── 3. Analyse de sécurité ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etape_13_deployable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit — static analysis
        run: bandit -r app/ -ll --format json -o bandit-report.json || true
        # Ne bloque pas sur les warnings mineurs

      - name: Safety — dependency audit
        run: safety check -r requirements.txt --output json > safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            etape_13_deployable/bandit-report.json
            etape_13_deployable/safety-report.json

  # ── 4. Build Docker (validation) ──────────────────────────────────────────
  docker-build:
    name: Docker Build (test stage)
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test stage (runs tests inside Docker)
        uses: docker/build-push-action@v5
        with:
          context: etape_13_deployable
          target: test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build production stage
        uses: docker/build-push-action@v5
        with:
          context: etape_13_deployable
          target: production
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
