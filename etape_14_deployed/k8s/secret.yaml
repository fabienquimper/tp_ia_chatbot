# ⚠️ NE PAS COMMITTER CE FICHIER AVEC DE VRAIES VALEURS !
# En production, utiliser External Secrets Operator, Vault, ou Sealed Secrets.
#
# Pour générer les valeurs base64 :
#   echo -n "votre-valeur" | base64
#
# Pour créer le secret via kubectl :
#   kubectl create secret generic chatbot-secrets \
#     --from-literal=openai-api-key="sk-..." \
