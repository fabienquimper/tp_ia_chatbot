apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-api
  namespace: chatbot
  labels:
    app: chatbot-api
    version: "4.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0           # Zero-downtime deployment
      maxSurge: 1
  template:
    metadata:
      labels:
        app: chatbot-api
        version: "4.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: chatbot-sa
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: chatbot
          image: ghcr.io/YOUR_ORG/chatbot-api:latest  # ← Remplacer YOUR_ORG
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          envFrom:
            - configMapRef:
                name: chatbot-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: openai-api-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: secret-key

          volumeMounts:
            - name: chatbot-data
              mountPath: /app/data

          # Resources (adapter selon la charge réelle)
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10   # /health peut prendre ~3s si le LLM est injoignable

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10   # idem

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: chatbot-data
          persistentVolumeClaim:
            claimName: chatbot-data-pvc

      # Permet aux pods d'atteindre le LLM local sur le réseau de la machine hôte
      # (LM Studio / Ollama à l'adresse IP locale ex: 192.168.1.141)
      hostAliases:
        - ip: "192.168.168.1"        # ← gateway Docker bridge (host.docker.internal)
          hostnames:
            - "host.docker.internal"

      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chatbot-sa
  namespace: chatbot
