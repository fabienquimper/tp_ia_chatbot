apiVersion: v1
kind: ConfigMap
metadata:
  name: chatbot-config
  namespace: chatbot
  labels:
    app: chatbot-api
data:
  MODEL: "gpt-4o-mini"
  MODE: "cloud"
  DB_PATH: "/app/data/chat.db"
  CHROMA_PATH: "/app/data/chroma_db"
  RAG_COLLECTION: "chatbot_docs"
  RAG_TOP_K: "3"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  ALLOWED_ORIGINS: "https://your-domain.com"
