# nginx.conf pour étape 14 (déploiement via image registry)
# L'image chatbot-api est tirée depuis GHCR, pas buildée localement.
# Cette configuration est identique à etape_13_deployable/nginx/nginx.conf.
# Copier et adapter ce fichier sur votre serveur de production.
#
# Référence complète : etape_13_deployable/nginx/nginx.conf

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json;

    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    upstream chatbot_api  { server chatbot:8000; }
    upstream grafana_ui   { server grafana:3000; }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name your-domain.com;   # ← Remplacer

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 1m;

        location / {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://chatbot_api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /auth/ {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://chatbot_api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://chatbot_api/health;
        }

        location /metrics {
            allow 172.20.0.0/24;
            deny all;
            proxy_pass http://chatbot_api/metrics;
        }

        location /grafana/ {
            proxy_pass http://grafana_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
