version: "3.9"

services:
  chatbot:      
    env_file:                                                                                                                                                                                                                                         
      - .env
    build: .
    container_name: chatbot_monitoring
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/chat.db
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-changeme}
      # - MODEL=${MODEL:-gpt-4o-mini}
      # - MODE=${MODE:-cloud}
      # - LOCAL_BASE_URL=${LOCAL_BASE_URL:-http://host.docker.internal:1234/v1}
      # - LOCAL_MODEL=${LOCAL_MODEL:-mistral-7b-instruct}
      # - DB_PATH=/app/data/chat.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - prometheus

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
