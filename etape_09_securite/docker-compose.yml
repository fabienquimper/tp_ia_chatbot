version: "3.9"
services:
  chatbot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-changeme}
      - MODEL=${MODEL:-gpt-4o-mini}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DB_PATH=/app/data/chat.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
