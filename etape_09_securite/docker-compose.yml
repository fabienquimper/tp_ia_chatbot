services:
  chatbot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-changeme}
      - MODE=${MODE:-local_mistral7b}
      - LOCAL_BASE_URL=${LOCAL_BASE_URL:-http://192.168.1.141:1234/v1}
      - LOCAL_MODEL=${LOCAL_MODEL:-mistralai/ministral-3-3b}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DB_PATH=/app/data/chat.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
