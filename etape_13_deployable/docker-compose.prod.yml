version: "3.9"
# ── Production : stack complète avec Nginx reverse proxy ─────────────────
# Usage : docker compose -f docker-compose.prod.yml up -d
# Prérequis : .env.production rempli (voir .env.example)

services:

  # ── Nginx Reverse Proxy (TLS termination) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro     # Certificats TLS (Let's Encrypt ou auto-signés)
      - nginx_logs:/var/log/nginx
    restart: always
    networks:
      - chatbot_net
    depends_on:
      chatbot:
        condition: service_healthy

  # ── Application (build avec tests) ───────────────────────────────────────
  chatbot:
    build:
      context: .
      target: production
    container_name: chatbot_api
    expose:
      - "8000"           # Pas exposé publiquement, passé par Nginx
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL=${MODEL:-gpt-4o-mini}
      - MODE=${MODE:-cloud}
      - DB_PATH=/app/data/chat.db
      - CHROMA_PATH=/app/data/chroma_db
      - RAG_COLLECTION=${RAG_COLLECTION:-chatbot_docs}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=${TOKEN_EXPIRE:-60}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - chatbot_data:/app/data
    restart: always
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: always
    networks:
      - chatbot_net
    depends_on:
      - chatbot

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: always
    networks:
      - chatbot_net
    depends_on:
      - prometheus

networks:
  chatbot_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  chatbot_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local
