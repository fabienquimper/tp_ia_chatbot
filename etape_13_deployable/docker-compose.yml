version: "3.9"
# ── Dev : stack locale complète ───────────────────────────────────────────
# Usage : docker compose up --build
# Accès : API http://localhost:8000/docs | Grafana http://localhost:3000
#
# ── PROBLÈME CONNU : iptables / kernel récent (Ubuntu 25.x+ / kernel 6.17+) ──
#
# Symptôme : "Chain 'DOCKER-ISOLATION-STAGE-2' does not exist" au démarrage.
# Cause    : Docker crée ses chaînes avec le backend iptables-legacy,
#            mais Ubuntu récent utilise nf_tables par défaut.
#            Un restart Docker perd la synchronisation entre les deux.
#
# Fix (passer en iptables-legacy) :
#   sudo update-alternatives --set iptables /usr/sbin/iptables-legacy
#   sudo update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy
#   sudo systemctl restart docker
#
# Revenir en arrière (remettre nf_tables) :
#   sudo update-alternatives --set iptables /usr/sbin/iptables-nft
#   sudo update-alternatives --set ip6tables /usr/sbin/ip6tables-nft
#   sudo systemctl restart docker
#
# Vérifier le mode actif :
#   sudo update-alternatives --display iptables
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Application ──────────────────────────────────────────────────────────
  chatbot:
    build:
      context: .
      target: production          # Skip le stage "test" en dev local
    container_name: chatbot_api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-changeme}
      - MODEL=${MODEL:-gpt-4o-mini}
      - MODE=${MODE:-cloud}
      - LOCAL_BASE_URL=${LOCAL_BASE_URL:-http://host.docker.internal:1234/v1}
      - LOCAL_MODEL=${LOCAL_MODEL:-openai/gpt-oss-20b}
      - DB_PATH=/app/data/chat.db
      - CHROMA_PATH=/app/data/chroma_db
      - RAG_COLLECTION=chatbot_docs
      - RAG_TOP_K=5
      - SECRET_KEY=${SECRET_KEY:-dev-secret-changeme}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    volumes:
      - chatbot_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ── GPU NVIDIA (optionnel — métriques Ollama/LM Studio via pynvml) ─────────
    #
    # Pré-requis :
    #   1. Pilotes NVIDIA installés   → nvidia-smi doit fonctionner
    #   2. NVIDIA Container Toolkit   → docker info | grep -i nvidia
    #                                   doit afficher "nvidia" dans Runtimes
    #
    # Installation du toolkit (Ubuntu — dépôt NVIDIA requis, absent des repos Ubuntu) :
    #   curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
    #     | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-ctk-keyring.gpg
    #   curl -sL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
    #     | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-ctk-keyring.gpg] https://#g' \
    #     | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
    #   sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
    #   sudo nvidia-ctk runtime configure --runtime=docker
    #   sudo systemctl restart docker
    #
    # Sans GPU : commenter le bloc deploy ci-dessous → les panneaux Grafana GPU
    # afficheront "No data" (comportement normal, l'app ne plante pas).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - chatbot_net
    depends_on:
      - chatbot

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - chatbot_net
    depends_on:
      - prometheus

networks:
  chatbot_net:
    driver: bridge

volumes:
  chatbot_data:
  prometheus_data:
  grafana_data:
