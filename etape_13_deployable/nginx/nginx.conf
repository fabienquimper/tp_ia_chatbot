worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Sécurité ─────────────────────────────────────────────────────────
    server_tokens off;                          # Cache la version Nginx
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # ── Rate limiting (protection DoS) ───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ── Upstream ──────────────────────────────────────────────────────────
    upstream chatbot_api {
        server chatbot:8000;
        keepalive 32;
    }

    upstream grafana_ui {
        server grafana:3000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS principal ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name localhost;  # Remplacer par votre domaine

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS (activer seulement si domaine permanent)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 1m;

        # ── API Chatbot ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass         http://chatbot_api/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Auth : rate limit plus strict
        location /api/auth/ {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://chatbot_api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check public (pas de rate limit)
        location /health {
            proxy_pass http://chatbot_api/health;
            proxy_set_header Host $host;
        }

        # Métriques Prometheus — accès restreint réseau interne
        location /metrics {
            allow 172.20.0.0/24;   # Réseau Docker interne
            deny all;
            proxy_pass http://chatbot_api/metrics;
        }

        # ── Grafana (sous-chemin /grafana) ────────────────────────────────
        location /grafana/ {
            proxy_pass         http://grafana_ui/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Swagger UI ────────────────────────────────────────────────────
        location /docs {
            proxy_pass http://chatbot_api/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://chatbot_api/openapi.json;
        }
    }
}
